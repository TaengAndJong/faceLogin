#서버 실행 포트
server:
  port: 8081 #서버포트 설정
  servlet: #컨텍스트 패스 설정
    context-path: / #JSP의 pageContext.request.contextpath

#애플리케이션명
spring:
  application:
    name: face-login
  #JSP를 뷰로 사용하면 View Reslover가 작동하므로 설정 및 폴더생성 필요
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
#데이터베이스 설정
  datasource:
    url: jdbc:postgresql://localhost:5433/facedb
    username: facedb
    password: java
    driver-class-name: org.postgresql.Driver
  flyway: #기존 디비를 기준으로 초기화 등록
    baseline-on-migrate: true
  docker: # 도커 미사용 시 , false 변경
    compose:
      enabled: true
#마이바티스 설정 (classpath = src/main/resources 기준)
mybatis:
  mapper-locations: classpath:mybatis/mapper/*.xml
  type-aliases-package: com.ai.facelogin
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info
    org.springframework: info
    org.springframework.jdbc: info
    org.springframework.security: DEBUG
    org.mybatis: debug



