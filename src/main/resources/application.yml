#서버 실행 포트
server:
  port: 8081 #서버포트 설정
  servlet: #컨텍스트 패스 설정
    context-path: / #JSP의 pageContext.request.contextpath

#애플리케이션명
spring:
  application:
    name: face-login
  #redis 설정
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost} # 도커 컴포즈로 실행하면 SPRING_DATA_REDIS_HOST 환경변수가 'redis'가 됨
      port: 6379 # 로컬 실행 시에는 기본값인 localhost를 사용

  #JSP를 뷰로 사용하면 View Reslover가 작동하므로 설정 및 폴더생성 필요
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  #SMTP 설정
  mail:
    host: smtp.gmail.com          # 구글 SMTP 서버 주소
    port: 587                     # TLS 포트 번호
    username: ${SMTP_USERNAME}   # 본인의 구글 이메일
    password: ${SMTP_PWS}  # 방금 발급받은 16자리 앱 비밀번호 (공백 제외)
    properties:
      mail:
        smtp:
          auth: true              # 사용자 인증 사용 여부
          starttls:
            enable: true          # 보안 연결(TLS) 활성화
          connectiontimeout: 5000 # 연결 시간 초과 (5초)
          timeout: 5000
          writetimeout: 5000
  #파일설정 , 1차 검증
  multipart:
    max-file-size: 5MB          # 개별 파일 당 최대 크기
    max-request-size: 10MB       # 전체 요청(파일 + DTO 데이터 등) 합계 최대 크기
    enabled: true               # 멀티파트 업로드 활성화 여부

    
#데이터베이스 설정
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/facedb
    username: ${DB_USERNAME}
    password: ${DB_PWS}
    driver-class-name: org.postgresql.Driver
  flyway: #기존 디비를 기준으로 초기화 등록
    baseline-on-migrate: true
  docker: # 도커 미사용 시 , false 변경
    compose:
      enabled: true

# 파이썬 AI 서버
ai-service:
  # 도커 컴포즈 실행 시 PYTHON_API_URL 환경변수로 'http://python-ai:8000' 주입
  url: ${PYTHON_API_URL:http://localhost:8000}


